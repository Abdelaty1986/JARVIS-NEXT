[variables]
NODE_ENV="production"

[phases.setup]
nixPkgs = ["python311","nodejs_20"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r requirements.txt",
  "npm install -g @opencode-ai/cli",
  "echo ===== OPCODE CHECK =====",
  "which opencode",
  "opencode --version"
]

[start]
cmd = "export PATH=/usr/local/bin:$PATH && gunicorn app:app --bind 0.0.0.0:$PORT"
